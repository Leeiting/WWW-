<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隨便吃</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e5e5e5;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Noto Sans TC', 'Noto Sans', sans-serif;
    }

    .phone {
      width: 390px;
      min-height: 844px;
      background: #fff;
      position: relative;
      overflow: hidden;
    }

    /* ── Hero Image ── */
    .hero {
      width: 390px;
      height: 188px;
      position: relative;
      overflow: hidden;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .hero-back {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .hero-back svg { width: 20px; height: 20px; }
    .hero-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 8px;
    }
    .hero-actions svg { width: 24px; height: 24px; }

    /* ── Content ── */
    .content {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Restaurant Info ── */
    .restaurant-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 13px;
      padding: 16px 20px 0;
    }

    .restaurant-name {
      font-size: 24px;
      font-weight: 600;
      color: #000;
      text-align: center;
    }

    .restaurant-meta {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: rgba(51,51,51,0.95);
      flex-wrap: wrap;
      justify-content: center;
    }
    .restaurant-meta .star { color: rgba(51,51,51,0.95); }
    .restaurant-meta .dot { color: #8f8c8c; }
    .restaurant-meta .muted { color: #8f8c8c; }
    .restaurant-meta .uber-one { color: #fdd506; }
    .restaurant-meta .arrow { color: #8f8c8c; font-size: 11px; margin-left: 2px; }

    /* ── Order Type Toggle ── */
    .order-type-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 13px;
      padding: 0 20px;
    }

    .toggle-group {
      width: 116px;
      height: 40px;
      background: #d9d9d9;
      border-radius: 20px;
      position: relative;
      display: flex;
      align-items: center;
    }
    .toggle-active {
      position: absolute;
      left: 4px;
      width: 56px;
      height: 31px;
      background: white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #000;
      z-index: 2;
    }
    .toggle-inactive {
      position: absolute;
      right: 8px;
      font-size: 12px;
      font-weight: 600;
      color: #000;
      z-index: 1;
    }

    .group-order-btn {
      width: 106px;
      height: 40px;
      background: #d9d9d9;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #000;
      cursor: pointer;
      border: none;
    }
    .group-order-btn svg { width: 17px; height: 17px; }

    /* ── Info Cards ── */
    .info-cards {
      margin: 0 20px;
      border: 1px solid #d8d8d8;
      border-radius: 20px;
      height: 64px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }
    .info-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .info-card + .info-card {
      border-left: 1px solid #d8d8d8;
    }
    .info-card-title {
      font-size: 14px;
      font-weight: 400;
      color: #000;
      line-height: 1.5;
    }
    .info-card-sub {
      font-size: 12px;
      color: rgba(102,102,102,0.95);
      line-height: 1.5;
    }

    /* ── Promo Banner ── */
    .promo-banner {
      margin: 0 20px;
      background: rgba(254,168,0,0.25);
      border-radius: 20px;
      height: 84px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      padding: 8px;
    }
    .promo-text {
      font-size: 12px;
      font-weight: 600;
      color: #000;
      line-height: 1.5;
      z-index: 2;
      width: 180px;
    }
    .promo-img {
      position: absolute;
      right: 0;
      top: 0;
      width: 95px;
      height: 84px;
      border-radius: 0 20px 20px 0;
      overflow: hidden;
    }
    .promo-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .promo-badge {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: white;
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 8px;
      color: #000;
      font-weight: 400;
      z-index: 3;
    }

    /* ── Section Title ── */
    .section-title {
      padding: 8px 16px 0;
      font-size: 20px;
      font-weight: 600;
      color: #000;
      line-height: 1.5;
    }

    /* ── Menu Items ── */
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px 13px 16px;
      border-bottom: 1px solid rgba(244,244,244,0.95);
    }
    .menu-item-info {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .menu-item-name {
      font-size: 15px;
      font-weight: 600;
      color: rgba(51,51,51,0.95);
      line-height: 1.5;
    }
    .menu-item-price {
      font-size: 13px;
      font-weight: 600;
      color: rgba(51,51,51,0.95);
      line-height: 1.5;
    }
    .menu-item-origin {
      font-size: 13px;
      font-weight: 600;
      color: rgba(102,102,102,0.95);
      line-height: 1.5;
    }
    .add-btn {
      width: 38px;
      height: 35px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 22px;
    }
    .add-btn svg { width: 35px; height: 35px; }
  </style>
</head>
<body>
<div class="phone">

  <!-- Hero Image -->
  <div class="hero">
    <img src="https://www.figma.com/api/mcp/asset/c271f78d-72b2-45ca-a5a0-882501a31af7" alt="餐廳照片">
    <div class="hero-back">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M13 4L7 10L13 16" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="hero-actions">
      <!-- Search -->
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7" stroke="#fff" stroke-width="2"/>
        <path d="M16.5 16.5L21 21" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <!-- Heart -->
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 21C12 21 3 14.5 3 8.5C3 5.42 5.42 3 8.5 3C10.24 3 11.81 3.89 12 5C12.19 3.89 13.76 3 15.5 3C18.58 3 21 5.42 21 8.5C21 14.5 12 21 12 21Z" stroke="#fff" stroke-width="2"/>
      </svg>
      <!-- More -->
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="5" cy="12" r="1.5" fill="#fff"/>
        <circle cx="12" cy="12" r="1.5" fill="#fff"/>
        <circle cx="19" cy="12" r="1.5" fill="#fff"/>
      </svg>
    </div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Restaurant Info -->
    <div class="restaurant-info">
      <div class="restaurant-name">隨便吃</div>
      <div class="restaurant-meta">
        <span class="star">4.8 ★</span>
        <span class="dot"> · </span>
        <span class="muted">(200+) · 10TWD 費用 ·</span>
        <span class="uber-one"> Uber One</span>
        <span class="muted"> · 0.4公里</span>
        <span class="arrow">›</span>
      </div>
    </div>

    <!-- Order Type Toggle + Group Order -->
    <div class="order-type-row">
      <div class="toggle-group">
        <div class="toggle-active">外送</div>
        <div class="toggle-inactive">自取</div>
      </div>
      <button class="group-order-btn">
        <svg viewBox="0 0 17 17" fill="none">
          <image href="https://www.figma.com/api/mcp/asset/a7421dd9-2550-47f2-a645-b8b24bc45b8c" width="17" height="17"/>
        </svg>
        團購訂單
      </button>
    </div>

    <!-- Info Cards -->
    <div class="info-cards">
      <div class="info-card">
        <div class="info-card-title">10TWD 費用</div>
        <div class="info-card-sub">價格與費用</div>
      </div>
      <div class="info-card">
        <div class="info-card-title">10-20 分鐘</div>
        <div class="info-card-sub">外送時間</div>
      </div>
    </div>

    <!-- Promo Banner -->
    <div class="promo-banner">
      <div class="promo-text">使用Uber One 可享 $0 外送費</div>
      <div class="promo-img">
        <img src="https://www.figma.com/api/mcp/asset/c271f78d-72b2-45ca-a5a0-882501a31af7" alt="">
      </div>
      <div class="promo-badge">免費使用1個月</div>
    </div>

    <!-- Spacer -->
    <div style="height: 34px;"></div>

    <!-- Section Title -->
    <div class="section-title">您專屬的推薦商品</div>

    <!-- Menu Items -->
    <div class="menu-item">
      <div class="menu-item-info">
        <div class="menu-item-name">空心菜炒牛肉</div>
        <div class="menu-item-price">$200.00</div>
        <div class="menu-item-origin">牛肉來自紐西蘭</div>
      </div>
      <button class="add-btn">
        <svg viewBox="0 0 35 35" fill="none">
          <image href="https://www.figma.com/api/mcp/asset/8eb8b8fe-f62d-464b-8801-bb1ddeef35df" width="35" height="35"/>
        </svg>
      </button>
    </div>

    <div class="menu-item">
      <div class="menu-item-info">
        <div class="menu-item-name">糖醋排骨</div>
        <div class="menu-item-price">$220.00</div>
        <div class="menu-item-origin">豬肉來自台灣</div>
      </div>
    </div>

    <div class="menu-item">
      <div class="menu-item-info">
        <div class="menu-item-name">桂竹筍炒肉絲</div>
        <div class="menu-item-price">$180.00</div>
        <div class="menu-item-origin">豬肉來自台灣</div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
